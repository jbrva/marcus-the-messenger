<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus and the Lost Scroll — A Roman Numeral Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #F5E6C8;
    --parchment-light: #FAF1DC;
    --parchment-dark: #E8D4A8;
    --ink: #3A2814;
    --ink-light: #6B4F35;
    --terracotta: #C8553D;
    --terracotta-dark: #9A3F2D;
    --laurel: #5C7C4E;
    --laurel-dark: #3F5635;
    --imperial: #5B3E7D;
    --gold: #D4A14A;
    --gold-dark: #A87F35;
    --wine: #7A2E1F;
    --stone: #B8A984;
    --stone-dark: #8A7B5C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Lora', Georgia, 'Times New Roman', serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 10%, rgba(212, 161, 74, 0.08), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(122, 46, 31, 0.07), transparent 50%),
      var(--parchment);
    min-height: 100vh;
    padding: 20px 16px;
    line-height: 1.6;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.23 0 0 0 0 0.16 0 0 0 0 0.08 0 0 0 0.18 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity: 0.35;
    z-index: 0;
  }
  .display { font-family: 'Cinzel', 'Trajan Pro', 'Times New Roman', serif; letter-spacing: 0.03em; }
  .container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  /* PARCHMENT CARD */
  .scroll-card {
    background: var(--parchment-light);
    border: 1px solid var(--stone);
    border-radius: 4px;
    padding: 32px 28px;
    box-shadow:
      inset 0 0 60px rgba(184, 169, 132, 0.25),
      0 4px 20px rgba(58, 40, 20, 0.15);
    position: relative;
    min-height: 480px;
  }
  .scroll-card::before, .scroll-card::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 14px;
    background: repeating-linear-gradient(
      90deg,
      var(--stone-dark) 0 8px,
      var(--ink-light) 8px 10px,
      var(--stone-dark) 10px 18px
    );
    opacity: 0.6;
  }
  .scroll-card::before { top: -7px; border-radius: 4px 4px 0 0; }
  .scroll-card::after { bottom: -7px; border-radius: 0 0 4px 4px; }
  /* TOP BAR */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .progress-map { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 200px; }
  .stage-dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--parchment-dark);
    border: 2px solid var(--stone-dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink-light);
    transition: all 0.3s ease;
  }
  .stage-dot.done { background: var(--laurel); border-color: var(--laurel-dark); color: var(--parchment-light); }
  .stage-dot.current { background: var(--terracotta); border-color: var(--wine); color: var(--parchment-light); transform: scale(1.1); box-shadow: 0 0 0 3px rgba(200, 85, 61, 0.2); }
  .stage-line { flex: 1; height: 2px; background: var(--stone); opacity: 0.5; }
  .score-pill {
    background: var(--ink);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 999px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
    border: 1px solid var(--gold-dark);
  }
  /* HELP / REFERENCE */
  .help-toggle {
    background: transparent;
    border: 1.5px solid var(--stone-dark);
    color: var(--ink);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s;
  }
  .help-toggle:hover { background: var(--gold); color: var(--ink); border-color: var(--gold-dark); }
  .help-panel {
    background: var(--parchment-dark);
    border: 1px dashed var(--stone-dark);
    border-radius: 4px;
    padding: 14px;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .help-panel-title { font-family: 'Cinzel', serif; font-weight: 700; color: var(--wine); margin-bottom: 8px; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
  .help-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(72px, 1fr)); gap: 6px; }
  .help-item { background: var(--parchment-light); border: 1px solid var(--stone); border-radius: 3px; padding: 6px; text-align: center; }
  .help-item .hr { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--wine); line-height: 1; }
  .help-item .ha { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
  /* CONTENT */
  .scene-illus { display: flex; justify-content: center; margin-bottom: 18px; }
  .scene-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--wine);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }
  .scene-subtitle {
    font-style: italic;
    color: var(--ink-light);
    text-align: center;
    margin-bottom: 22px;
    font-size: 15px;
  }
  .scene-text {
    font-size: 16px;
    line-height: 1.75;
    margin-bottom: 18px;
  }
  .scene-text strong { color: var(--wine); }
  .narration {
    font-style: italic;
    color: var(--ink-light);
    text-align: center;
    margin-bottom: 16px;
  }
  /* SYMBOL ORIGIN CARDS */
  .origins {
    display: grid;
    gap: 14px;
    margin: 18px 0;
  }
  .origin-card {
    background: var(--parchment-light);
    border: 1px solid var(--stone);
    border-left: 4px solid var(--gold-dark);
    border-radius: 3px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 14px;
    align-items: center;
  }
  .origin-symbol {
    font-family: 'Cinzel', serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--wine);
    text-align: center;
    line-height: 1;
  }
  .origin-symbol .val { display: block; font-size: 12px; color: var(--ink-light); margin-top: 4px; font-weight: 400; letter-spacing: 0.05em; }
  .origin-text { font-size: 14px; line-height: 1.6; }
  .origin-text strong { color: var(--wine); font-weight: 700; }
  /* MATH BOX */
  .math-box {
    background: var(--imperial);
    color: var(--parchment-light);
    border-radius: 4px;
    padding: 16px 18px;
    margin: 18px 0;
    font-size: 15px;
    line-height: 1.7;
    border: 1px solid #432d5e;
  }
  .math-box .label {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--gold);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .math-example {
    background: rgba(0,0,0,0.18);
    padding: 8px 12px;
    border-radius: 3px;
    margin-top: 8px;
    font-family: 'Cinzel', serif;
    font-size: 16px;
    text-align: center;
  }
  /* NUMERAL EXAMPLES TABLE */
  .examples-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
    gap: 8px;
    margin: 16px 0;
  }
  .ex-tile {
    background: var(--parchment-dark);
    border: 1px solid var(--stone);
    border-radius: 3px;
    padding: 10px 6px;
    text-align: center;
  }
  .ex-tile .er { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--wine); line-height: 1; }
  .ex-tile .ev { font-size: 13px; color: var(--ink-light); margin-top: 4px; }
  /* QUESTION */
  .q-counter { font-size: 13px; color: var(--ink-light); text-align: center; font-style: italic; margin-bottom: 8px; }
  .q-prompt { font-size: 16px; text-align: center; margin-bottom: 14px; }
  .q-prompt strong { color: var(--wine); }
  .q-numeral {
    font-family: 'Cinzel', serif;
    font-size: 64px;
    font-weight: 700;
    color: var(--wine);
    text-align: center;
    letter-spacing: 0.08em;
    margin: 18px 0 22px;
    line-height: 1;
    text-shadow: 0 2px 0 rgba(212, 161, 74, 0.3);
  }
  .q-number {
    font-family: 'Cinzel', serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--imperial);
    text-align: center;
    margin: 18px 0 22px;
    line-height: 1;
  }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 460px;
    margin: 0 auto;
  }
  .option-btn {
    background: var(--parchment-light);
    border: 2px solid var(--stone-dark);
    border-radius: 4px;
    padding: 14px;
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--wine);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.04em;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--gold);
    border-color: var(--gold-dark);
    transform: translateY(-2px);
    box-shadow: 0 3px 8px rgba(58, 40, 20, 0.2);
  }
  .option-btn:active:not(:disabled) { transform: translateY(0); }
  .option-btn.correct { background: var(--laurel); color: var(--parchment-light); border-color: var(--laurel-dark); }
  .option-btn.wrong { background: var(--terracotta); color: var(--parchment-light); border-color: var(--terracotta-dark); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct:disabled, .option-btn.wrong:disabled { opacity: 1; }
  .option-btn.dim { opacity: 0.55; }
  .feedback {
    text-align: center;
    margin: 16px 0 4px;
    font-size: 15px;
    min-height: 26px;
    font-weight: 500;
    line-height: 1.5;
  }
  .feedback.good { color: var(--laurel-dark); }
  .feedback.bad { color: var(--terracotta-dark); }
  .feedback .explainer {
    display: block;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-light);
    margin-top: 4px;
    font-weight: 400;
  }
  /* BUTTONS */
  .primary-btn {
    background: var(--terracotta);
    color: var(--parchment-light);
    border: 2px solid var(--wine);
    border-radius: 4px;
    padding: 14px 32px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: block;
    margin: 22px auto 0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s ease;
    box-shadow: 0 3px 0 var(--wine);
  }
  .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 var(--wine); }
  .primary-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--wine); }
  /* SECONDARY BUTTON (restart from welcome) */
  .restart-btn {
    background: transparent;
    color: var(--ink-light);
    border: 1.5px solid var(--stone-dark);
    border-radius: 4px;
    padding: 10px 24px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: block;
    margin: 10px auto 0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .restart-btn:hover {
    background: var(--parchment-dark);
    border-color: var(--ink-light);
    color: var(--ink);
  }
  .resume-note {
    font-style: italic;
    color: var(--laurel-dark);
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
  }
  /* REWARD / VICTORY */
  .badge-row { display: flex; gap: 12px; justify-content: center; margin: 18px 0; flex-wrap: wrap; }
  .badge {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--parchment-dark);
    border: 3px solid var(--stone-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
  }
  .badge.earned {
    background: var(--gold);
    border-color: var(--gold-dark);
    box-shadow: 0 0 16px rgba(212, 161, 74, 0.5);
  }
  .badge.locked { opacity: 0.4; }
  .badge .roman {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--wine);
  }
  .reward-name {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--wine);
    text-align: center;
    margin: 8px 0;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .victory-banner {
    text-align: center;
    margin: 16px 0 24px;
  }
  .victory-banner h1 {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    color: var(--wine);
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .victory-final-score {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--imperial);
    font-weight: 500;
    margin: 14px 0;
  }
  /* Question type chip */
  .qtype-chip {
    display: inline-block;
    background: var(--parchment-dark);
    border: 1px solid var(--stone);
    border-radius: 3px;
    padding: 3px 10px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--wine);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .center { text-align: center; }
  .max-w { max-width: 540px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>
<div class="container">
  <div class="scroll-card" id="card">
    <div id="content"></div>
  </div>
</div>
<script>
"use strict";
/* ============== GAME DATA ============== */
const STAGES = [
  {
    id: "forum",
    name: "The Forum",
    rewardName: "The Scribe's Quill",
    rewardLetter: "I",
    illus: "forum",
    story: "Marcus, a young messenger boy, dashes through the noisy Forum at dawn. Vendors shout, senators argue, and pigeons scatter. Suddenly, a merchant drops a scroll covered in strange marks! An old scribe with a long white beard picks it up. \"Aha,\" he says, smiling at Marcus. \"These are <strong>Roman numerals</strong>. Learn the first three and you can begin to read.\"",
    origins: [
      { sym: "I", val: 1, text: "<strong>I is just a tally mark</strong> — a single notch on a stick. Long before Romans wrote on scrolls, shepherds counted their sheep by carving one line for each animal. One sheep, one line. That tradition became the numeral I." },
      { sym: "V", val: 5, text: "<strong>V is the shape of an open hand</strong>. Hold up your hand with your thumb sticking out — the space between your thumb and pointer finger makes a V! Romans used V for five because we have five fingers on each hand." },
      { sym: "X", val: 10, text: "<strong>X is two V's together</strong> — one right-side up, one upside down. Two hands make ten fingers, and two V's stacked make an X. Some scholars also think X comes from shepherds who would cross out every tenth tally mark to make counting easier." }
    ],
    math: {
      label: "The Adding Rule",
      text: "When numerals are written together, you simply <strong>add them up</strong>. The bigger ones go first, then smaller ones follow.",
      example: "VIII = V + I + I + I = 5 + 1 + 1 + 1 = 8"
    },
    examples: [
      {n: "I", v: 1}, {n: "II", v: 2}, {n: "III", v: 3},
      {n: "V", v: 5}, {n: "VI", v: 6}, {n: "VII", v: 7},
      {n: "VIII", v: 8}, {n: "X", v: 10}, {n: "XI", v: 11},
      {n: "XII", v: 12}, {n: "XIII", v: 13}, {n: "XV", v: 15}
    ],
    questions: [
      { type: "read", prompt: "What number is this?", numeral: "VII", answer: 7, options: [2, 7, 12, 17], explain: "V (5) + I (1) + I (1) = 7." },
      { type: "write", prompt: "Which numeral means <strong>8</strong>?", number: 8, answer: "VIII", options: ["IIIV", "VIII", "IIX", "IXII"], explain: "VIII = V (5) + I + I + I (3 more) = 8." },
      { type: "story", prompt: "A merchant has <strong>III</strong> apples and <strong>II</strong> grapes. How many fruits in total?", numeral: "III + II", answer: 5, options: [4, 5, 6, 32], explain: "3 apples + 2 grapes = 5 fruits, written as V." },
      { type: "read", prompt: "What number is this?", numeral: "XIII", answer: 13, options: [8, 113, 13, 23], explain: "X (10) + I + I + I (3 more) = 13." },
      { type: "story", prompt: "A Roman soldier guards <strong>XV</strong> doorways. How many doorways?", numeral: "XV", answer: 15, options: [10, 15, 16, 25], explain: "X (10) + V (5) = 15." }
    ]
  },
  {
    id: "aqueduct",
    name: "The Great Aqueduct",
    rewardName: "The Engineer's Chisel",
    rewardLetter: "II",
    illus: "aqueduct",
    story: "Marcus climbs the great stone aqueduct that brings water to Rome. The chief engineer, a tall woman with a measuring rope, points to a tally board carved into the stone. \"For bigger numbers we need new symbols,\" she explains. \"Help me check the count of arches and we'll send you on your way.\"",
    origins: [
      { sym: "L", val: 50, text: "<strong>L came from an old arrow shape</strong>. The original symbol for 50 looked a bit like a downward arrow (↓). Over many years of writing on stone and parchment, scribes simplified it into the shape we now call L." },
      { sym: "C", val: 100, text: "<strong>C is for centum</strong> — the Latin word for one hundred! That's the same root that gives us \"<em>century</em>\" (100 years) and \"<em>cent</em>\" (1/100 of a dollar). Easy to remember: C for Century, C for 100." }
    ],
    math: {
      label: "The Adding Rule (still!)",
      text: "Same rule as before — just add the values together, biggest to smallest.",
      example: "CLXX = C (100) + L (50) + X (10) + X (10) = 170"
    },
    examples: [
      {n: "L", v: 50}, {n: "LX", v: 60}, {n: "LXX", v: 70},
      {n: "LXXX", v: 80}, {n: "C", v: 100}, {n: "CX", v: 110},
      {n: "CL", v: 150}, {n: "CC", v: 200}, {n: "CCC", v: 300}
    ],
    questions: [
      { type: "read", prompt: "What number is this?", numeral: "LX", answer: 60, options: [40, 51, 60, 110], explain: "L (50) + X (10) = 60." },
      { type: "write", prompt: "Which numeral means <strong>70</strong>?", number: 70, answer: "LXX", options: ["LXX", "LVV", "XXL", "VVL"], explain: "L (50) + X + X (20 more) = 70." },
      { type: "story", prompt: "The aqueduct has <strong>CL</strong> arches. How many arches?", numeral: "CL", answer: 150, options: [101, 150, 105, 1050], explain: "C (100) + L (50) = 150 arches." },
      { type: "read", prompt: "What number is this?", numeral: "CCXX", answer: 220, options: [200, 220, 222, 320], explain: "C + C (200) + X + X (20) = 220." },
      { type: "story", prompt: "A general commands <strong>CCCXXX</strong> soldiers. How many?", numeral: "CCCXXX", answer: 330, options: [333, 303, 330, 363], explain: "C + C + C (300) + X + X + X (30) = 330." }
    ]
  },
  {
    id: "colosseum",
    name: "The Colosseum",
    rewardName: "The Gladiator's Helm",
    rewardLetter: "III",
    illus: "colosseum",
    story: "Marcus enters the roaring Colosseum. The crowd cheers, sand swirls, and the scoreboard glows: IV. IX. XL. \"That's strange,\" Marcus thinks. \"I see a small letter <em>before</em> a bigger one!\" A grizzled trainer leans over the rail and grins. \"Ah, that's the gladiator's trick, boy. When a smaller numeral comes <strong>before</strong> a bigger one, you <strong>subtract</strong> it.\"",
    origins: [
      { sym: "IV", val: 4, text: "<strong>The shortcut.</strong> Long ago, Romans wrote 4 as IIII (four tallies). Later they decided IV — <em>one before five</em> — was easier to read. Same idea for IX: <em>one before ten</em> means 9. This trick saves space and looks cleaner." },
      { sym: "XL", val: 40, text: "<strong>The same trick scales up.</strong> XL means \"<em>ten before fifty</em>\" — that's 50 minus 10, which equals 40. XC means \"<em>ten before one hundred</em>\" — that's 90." }
    ],
    math: {
      label: "The Subtracting Trick",
      text: "If a <strong>smaller</strong> numeral comes <strong>before</strong> a bigger one, subtract it. If it comes <strong>after</strong>, add it.",
      example: "XIV = X (10) + IV (4) = 14   ⚔   XIX = X (10) + IX (9) = 19"
    },
    examples: [
      {n: "IV", v: 4}, {n: "IX", v: 9}, {n: "XIV", v: 14},
      {n: "XIX", v: 19}, {n: "XL", v: 40}, {n: "XLV", v: 45},
      {n: "XLIX", v: 49}, {n: "XC", v: 90}, {n: "XCIX", v: 99}
    ],
    questions: [

const SAVE_KEY = "marcus-roman-numerals-v1";

function saveState() {
  // Don't save welcome/victory — there's nothing to resume into.
  if (state.screen === "welcome" || state.screen === "victory") return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      screen: state.screen,
      stage: state.stage,
      qIndex: state.qIndex,
      score: state.score,
      totalQuestions: state.totalQuestions,
      badges: state.badges.slice(),

      lastCorrect: state.lastCorrect
    }));
  } catch (e) { /* localStorage unavailable — fail silently */ }
}
function loadSavedState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || !parsed.screen) return null;
    return parsed;
  } catch (e) { return null; }
}
function clearSavedState() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}

        <div style="display:flex;gap:18px;align-items:center;text-align:left;">
          <div style="flex-shrink:0;">${svgIllus("marcus")}</div>
          <p class="scene-text" style="margin:0;">You are <strong>Marcus</strong>, a young messenger boy in ancient Rome. A mysterious scroll has appeared, written in symbols you cannot yet read. To deliver it, you must travel through four great places of Rome — the <strong>Forum</strong>, the <strong>Aqueduct</strong>, the <strong>Colosseum</strong>, and the <strong>Emperor's Hall</strong> — and master the ancient art of Roman numerals.</p>
        </div>
      </div>
      ${helpPanel()}
      ${resumeBlock}
    </div>`;
}
function renderStory() {
  const s = STAGES[state.stage];
  return `${topBar(true)}${helpButton()}
    <div class="scene-illus">${svgIllus(s.illus)}</div>
    <div class="qtype-chip center" style="display:block;text-align:center;">Stage ${state.stage + 1} of IV</div>
    <h2 class="scene-title">${s.name}</h2>
    <div class="max-w">
      <p class="scene-text">${s.story}</p>
    </div>
    ${helpPanel()}
    <button class="primary-btn" data-action="to-lesson">Meet the Symbols</button>`;
}
function renderLesson() {
  const s = STAGES[state.stage];
  return `${topBar(true)}${helpButton()}
    <h2 class="scene-title" style="font-size:22px;">Where the Symbols Come From</h2>
    <div class="origins">
      ${s.origins.map(o => `
        <div class="origin-card">
          <div class="origin-symbol">${o.sym}<span class="val">= ${o.val}</span></div>
          <div class="origin-text">${o.text}</div>
        </div>
      `).join("")}
    </div>
    <div class="math-box">
      <div class="label">${s.math.label}</div>
      <div>${s.math.text}</div>
      <div class="math-example">${s.math.example}</div>
    </div>
    <h3 class="scene-title" style="font-size:18px;margin-top:20px;">Examples to Read</h3>
    <div class="examples-grid">
      ${s.examples.map(e => `<div class="ex-tile"><div class="er">${e.n}</div><div class="ev">= ${e.v}</div></div>`).join("")}
    </div>
    ${helpPanel()}
    <button class="primary-btn" data-action="to-practice">Try It Out (${s.questions.length} Questions)</button>`;
}
function renderPractice() {
  const s = STAGES[state.stage];
  const q = s.questions[state.qIndex];
  const answered = state.lastCorrect !== null;
  const isLast = state.qIndex === s.questions.length - 1;
  let mainDisplay;
  if (q.type === "write") {
    mainDisplay = `<div class="q-number">${q.number}</div>`;
  } else {
    mainDisplay = `<div class="q-numeral">${q.numeral}</div>`;
  }
  let feedback = "";
  if (answered) {
    if (state.lastCorrect) {
      feedback = `<div class="feedback good">✓ Correct!<span class="explainer">${q.explain}</span></div>`;
    } else {
      const correctDisp = (q.type === "write" || q.type === "trick") ? q.answer : q.answer;
      feedback = `<div class="feedback bad">Not quite — the answer was <strong>${correctDisp}</strong>.<span class="explainer">${q.explain}</span></div>`;
    }
  }
  const typeLabels = {
    read: "Read the numeral",
    write: "Write the numeral",
    story: "Roman scenario",
    trick: "Find the mistake",
    math: "Numeral math"
  };
  return `${topBar(true)}${helpButton()}
    <div class="qtype-chip center" style="display:block;text-align:center;">${typeLabels[q.type] || "Practice"}</div>
    <div class="q-counter">${s.name} — Question ${state.qIndex + 1} of ${s.questions.length}</div>
    <div class="q-prompt">${q.prompt}</div>
    ${mainDisplay}
    <div class="options-grid">
      ${q.options.map(opt => {
        let cls = "option-btn";
        if (answered) {
          if (opt === q.answer) cls += " correct";
          else if (opt === state.lastSelected) cls += " wrong";
          else cls += " dim";
        }
        return `<button class="${cls}" data-action="answer" data-value="${opt}" ${answered ? "disabled" : ""}>${opt}</button>`;
      }).join("")}
    </div>
    ${feedback}
    ${helpPanel()}
    ${answered ? `<button class="primary-btn" data-action="next-question">${isLast ? "Claim Your Reward" : "Next Question →"}</button>` : ""}`;
}
function renderReward() {
  const s = STAGES[state.stage];
  const isLast = state.stage === STAGES.length - 1;
  return `${topBar(true)}
    <div class="center">
      <div class="scene-illus">${svgIllus("trophy")}</div>
      <h2 class="scene-title">Stage Complete!</h2>
      <div class="reward-name">You earned ${s.rewardName}</div>
      <div class="badge-row">
        ${state.badges.map((earned, i) => `
          <div class="badge ${earned ? 'earned' : 'locked'}" title="${STAGES[i].rewardName}">
            <span class="roman">${["I","II","III","IV"][i]}</span>
          </div>
        `).join("")}
      </div>
      <p class="scene-text max-w" style="font-style:italic;color:var(--ink-light);">${isLast ? "All four badges are yours! The path to the Emperor's Hall is complete. The lost scroll awaits..." : "Marcus tucks the reward into his satchel and continues toward his next destination."}</p>
      <button class="primary-btn" data-action="${isLast ? 'to-final' : 'next-stage'}">${isLast ? "Read the Lost Scroll" : "Continue the Journey"}</button>
    </div>`;
}
function renderFinal() {
  const q = FINAL_CHALLENGE.questions[state.finalQIndex];
  const answered = state.lastCorrect !== null;
  const isLast = state.finalQIndex === FINAL_CHALLENGE.questions.length - 1;
  const isFirst = state.finalQIndex === 0;
  let feedback = "";
  if (answered) {
    feedback = state.lastCorrect
      ? `<div class="feedback good">✓ Correct!<span class="explainer">${q.explain}</span></div>`
      : `<div class="feedback bad">The answer was <strong>${q.answer}</strong>.<span class="explainer">${q.explain}</span></div>`;
  }
  return `${topBar(false)}${helpButton()}
    <div class="center">
      <div class="scene-illus">${svgIllus("scroll")}</div>
      <h2 class="scene-title">The Lost Scroll</h2>
      ${isFirst && !answered ? `<p class="scene-text max-w">${FINAL_CHALLENGE.intro}</p>` : ""}
      <div class="qtype-chip">Final Challenge</div>
      <div class="q-counter">Line ${state.finalQIndex + 1} of ${FINAL_CHALLENGE.questions.length}</div>
      <div class="q-prompt">${q.prompt}</div>
      <div class="q-numeral">${q.numeral}</div>
      <div class="options-grid">
        ${q.options.map(opt => {
          let cls = "option-btn";
          if (answered) {
            if (opt === q.answer) cls += " correct";
            else if (opt === state.lastSelected) cls += " wrong";
            else cls += " dim";
          }
          return `<button class="${cls}" data-action="answer-final" data-value="${opt}" ${answered ? "disabled" : ""}>${opt}</button>`;
        }).join("")}
      </div>
      ${feedback}
      ${helpPanel()}
      ${answered ? `<button class="primary-btn" data-action="next-final">${isLast ? "See Your Victory" : "Decode Next Line →"}</button>` : ""}
    </div>`;
}
function renderVictory() {
  return `<div class="center">
    <div class="scene-illus">${svgIllus("trophy")}</div>
    <div class="victory-banner">
      <h1>VICTORY, MARCUS!</h1>
      <div class="scene-subtitle">Messenger of Rome</div>
    </div>
    <p class="scene-text max-w">You read every line of the lost scroll and delivered the message to the Emperor himself. The Senate and People of Rome honor your skill. You now understand Roman numerals — the same symbols still used today on clocks, chapter headings, the Olympic Games, movie credits, and the Super Bowl!</p>
    <div class="victory-final-score">Final score: ${state.score} / ${state.totalQuestions}</div>
    <div class="badge-row">
      ${state.badges.map((earned, i) => `
        <div class="badge earned" title="${STAGES[i].rewardName}">
          <span class="roman">${["I","II","III","IV"][i]}</span>
        </div>
      `).join("")}
    </div>
    <p class="scene-text max-w" style="font-style:italic;color:var(--ink-light);text-align:center;">— Ave Roma, Ave Marcus —</p>
    <button class="primary-btn" data-action="restart">Play Again</button>
  </div>`;
}
function render() {
  let html = "";
  switch (state.screen) {
    case "welcome": html = renderWelcome(); break;
    case "story": html = renderStory(); break;
    case "lesson": html = renderLesson(); break;
    case "practice": html = renderPractice(); break;
    case "reward": html = renderReward(); break;
    case "final": html = renderFinal(); break;
    case "victory": html = renderVictory(); break;
  }
  content.innerHTML = html;
  saveState();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
/* ============== ACTIONS ============== */
function totalQuestions() {
  return STAGES.reduce((acc, s) => acc + s.questions.length, 0) + FINAL_CHALLENGE.questions.length;
}
card.addEventListener("click", function(e) {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;
  if (action === "toggle-help") { state.showHelp = !state.showHelp; render(); return; }
  if (action === "begin") {
    clearSavedState();
    resumableSnapshot = null;
    state = {
      screen: "story", stage: 0, qIndex: 0, score: 0,
      totalQuestions: totalQuestions(),
      badges: [false,false,false,false],
      lastSelected: null, lastCorrect: null,
      showHelp: state.showHelp, finalQIndex: 0
    };
    render(); return;
  }
  if (action === "continue") {
    if (resumableSnapshot) {
      state = Object.assign({}, state, resumableSnapshot, { showHelp: state.showHelp });
      // totalQuestions might be missing on older saves — recompute defensively.
      if (!state.totalQuestions) state.totalQuestions = totalQuestions();
      resumableSnapshot = null;
    }
    render(); return;
  }
  if (action === "to-lesson") { state.screen = "lesson"; render(); return; }
  if (action === "to-practice") {
    state.screen = "practice";
    state.qIndex = 0;
    state.lastCorrect = null;
    state.lastSelected = null;
    render(); return;
  }
  if (action === "answer") {
    const raw = t.dataset.value;
    const q = STAGES[state.stage].questions[state.qIndex];
    const val = (typeof q.answer === "number") ? parseInt(raw, 10) : raw;
    state.lastSelected = val;
    state.lastCorrect = (val === q.answer);
    if (state.lastCorrect) state.score++;
    render(); return;
  }
  if (action === "next-question") {
    const s = STAGES[state.stage];
    if (state.qIndex < s.questions.length - 1) {
      state.qIndex++;
      state.lastCorrect = null;
      state.lastSelected = null;
      render();
    } else {
      state.badges[state.stage] = true;
      state.screen = "reward";
      render();
    }
    return;
  }
  if (action === "next-stage") {
    state.stage++;
    state.screen = "story";
    state.qIndex = 0;
    state.lastCorrect = null;
    state.lastSelected = null;
    render(); return;
  }
  if (action === "to-final") {
    state.screen = "final";
    state.finalQIndex = 0;
    state.lastCorrect = null;
    state.lastSelected = null;
    render(); return;
  }
  if (action === "answer-final") {
    const raw = t.dataset.value;
    const q = FINAL_CHALLENGE.questions[state.finalQIndex];
    const val = (typeof q.answer === "number") ? parseInt(raw, 10) : raw;
    state.lastSelected = val;
    state.lastCorrect = (val === q.answer);
    if (state.lastCorrect) state.score++;
    render(); return;
  }
  if (action === "next-final") {
    if (state.finalQIndex < FINAL_CHALLENGE.questions.length - 1) {
      state.finalQIndex++;
      state.lastCorrect = null;
      state.lastSelected = null;
      render();
    } else {
      state.screen = "victory";
      render();
    }
    return;
  }
  if (action === "restart") {
    clearSavedState();
    resumableSnapshot = null;
    state = {
      screen: "welcome", stage: 0, qIndex: 0, score: 0,
      totalQuestions: 0, badges: [false,false,false,false],
      lastSelected: null, lastCorrect: null, showHelp: false, finalQIndex: 0
    };
    render(); return;
  }
});
/* On page load, look for saved progress and offer to continue */
(function init() {
  const saved = loadSavedState();
  if (saved && saved.screen && saved.screen !== "welcome" && saved.screen !== "victory") {
    resumableSnapshot = saved;
  }
  render();
})();
</script>
</body>
</html>
