<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus and the Lost Scroll — A Roman Numeral Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #F5E6C8;
    --parchment-light: #FAF1DC;
    --parchment-dark: #E8D4A8;
    --ink: #3A2814;
    --ink-light: #6B4F35;
    --terracotta: #C8553D;
    --terracotta-dark: #9A3F2D;
    --laurel: #5C7C4E;
    --laurel-dark: #3F5635;
    --imperial: #5B3E7D;
    --imperial-dark: #432d5e;
    --imperial-bg: #E0DCEA;
    --imperial-bg-light: #EDEBF3;
    --gold: #D4A14A;
    --gold-dark: #A87F35;
    --wine: #7A2E1F;
    --rose-bg: #F4D5D8;
    --rose-bg-light: #FBE9EB;
    --stone: #B8A984;
    --stone-dark: #8A7B5C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Lora', Georgia, 'Times New Roman', serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 10%, rgba(212, 161, 74, 0.08), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(122, 46, 31, 0.07), transparent 50%),
      var(--parchment);
    min-height: 100vh;
    padding: 20px 16px;
    line-height: 1.6;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.23 0 0 0 0 0.16 0 0 0 0 0.08 0 0 0 0.18 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity: 0.35;
    z-index: 0;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .home-link {
    display: inline-block;
    color: var(--ink-light);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 4px 10px;
    border: 1px solid transparent;
    border-radius: 3px;
    transition: all 0.15s ease;
  }
  .home-link:hover { color: var(--wine); border-color: var(--stone-dark); }
  .scroll-card {
    background: var(--parchment-light);
    border: 1px solid var(--stone);
    border-radius: 4px;
    padding: 32px 28px;
    box-shadow: inset 0 0 60px rgba(184, 169, 132, 0.25), 0 4px 20px rgba(58, 40, 20, 0.15);
    position: relative;
    min-height: 480px;
  }
  .scroll-card::before, .scroll-card::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 14px;
    background: repeating-linear-gradient(90deg, var(--stone-dark) 0 8px, var(--ink-light) 8px 10px, var(--stone-dark) 10px 18px);
    opacity: 0.6;
  }
  .scroll-card::before { top: -7px; border-radius: 4px 4px 0 0; }
  .scroll-card::after { bottom: -7px; border-radius: 0 0 4px 4px; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .progress-map { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 200px; }
  .stage-dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--parchment-dark);
    border: 2px solid var(--stone-dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink-light);
    transition: all 0.3s ease;
  }
  .stage-dot.done { background: var(--laurel); border-color: var(--laurel-dark); color: var(--parchment-light); }
  .stage-dot.current { background: var(--terracotta); border-color: var(--wine); color: var(--parchment-light); transform: scale(1.1); box-shadow: 0 0 0 3px rgba(200, 85, 61, 0.2); }
  .stage-line { flex: 1; height: 2px; background: var(--stone); opacity: 0.5; }
  .score-pill {
    background: var(--ink);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 999px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
    border: 1px solid var(--gold-dark);
  }
  .player-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding: 6px 12px;
    background: var(--parchment-dark);
    border-radius: 999px;
    font-size: 12px;
  }
  .player-strip .who {
    font-family: 'Cinzel', serif;
    color: var(--wine);
    letter-spacing: 0.06em;
  }
  .player-strip .who .gender-mark {
    font-size: 14px;
    margin-right: 4px;
    vertical-align: -1px;
  }
  .player-strip .who.feminine .gender-mark { color: var(--wine); }
  .player-strip .who.masculine .gender-mark { color: var(--imperial); }
  .switch-link {
    color: var(--ink-light);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    border: 1px solid transparent;
    padding: 3px 8px;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .switch-link:hover { color: var(--wine); border-color: var(--stone-dark); }
  .help-toggle {
    background: transparent;
    border: 1.5px solid var(--stone-dark);
    color: var(--ink);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s;
  }
  .help-toggle:hover { background: var(--gold); color: var(--ink); border-color: var(--gold-dark); }
  .help-panel { background: var(--parchment-dark); border: 1px dashed var(--stone-dark); border-radius: 4px; padding: 14px; margin-bottom: 20px; font-size: 14px; }
  .help-panel-title { font-family: 'Cinzel', serif; font-weight: 700; color: var(--wine); margin-bottom: 8px; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
  .help-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(72px, 1fr)); gap: 6px; }
  .help-item { background: var(--parchment-light); border: 1px solid var(--stone); border-radius: 3px; padding: 6px; text-align: center; }
  .help-item .hr { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--wine); line-height: 1; }
  .help-item .ha { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
  .scene-illus { display: flex; justify-content: center; margin-bottom: 18px; }
  .scene-title { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; color: var(--wine); text-align: center; margin-bottom: 4px; letter-spacing: 0.04em; }
  .scene-subtitle { font-style: italic; color: var(--ink-light); text-align: center; margin-bottom: 22px; font-size: 15px; }
  .scene-text { font-size: 16px; line-height: 1.75; margin-bottom: 18px; }
  .scene-text strong { color: var(--wine); }
  .origins { display: grid; gap: 14px; margin: 18px 0; }
  .origin-card { background: var(--parchment-light); border: 1px solid var(--stone); border-left: 4px solid var(--gold-dark); border-radius: 3px; padding: 14px 16px; display: grid; grid-template-columns: 70px 1fr; gap: 14px; align-items: center; }
  .origin-symbol { font-family: 'Cinzel', serif; font-size: 44px; font-weight: 700; color: var(--wine); text-align: center; line-height: 1; }
  .origin-symbol .val { display: block; font-size: 12px; color: var(--ink-light); margin-top: 4px; font-weight: 400; letter-spacing: 0.05em; }
  .origin-text { font-size: 14px; line-height: 1.6; }
  .origin-text strong { color: var(--wine); font-weight: 700; }
  .math-box { background: var(--imperial); color: var(--parchment-light); border-radius: 4px; padding: 16px 18px; margin: 18px 0; font-size: 15px; line-height: 1.7; border: 1px solid var(--imperial-dark); }
  .math-box .label { font-family: 'Cinzel', serif; font-weight: 700; font-size: 12px; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }
  .math-example { background: rgba(0,0,0,0.18); padding: 8px 12px; border-radius: 3px; margin-top: 8px; font-family: 'Cinzel', serif; font-size: 16px; text-align: center; }
  .examples-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(85px, 1fr)); gap: 8px; margin: 16px 0; }
  .ex-tile { background: var(--parchment-dark); border: 1px solid var(--stone); border-radius: 3px; padding: 10px 6px; text-align: center; }
  .ex-tile .er { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--wine); line-height: 1; }
  .ex-tile .ev { font-size: 13px; color: var(--ink-light); margin-top: 4px; }
  .q-counter { font-size: 13px; color: var(--ink-light); text-align: center; font-style: italic; margin-bottom: 8px; }
  .q-prompt { font-size: 16px; text-align: center; margin-bottom: 14px; }
  .q-prompt strong { color: var(--wine); }
  .q-numeral { font-family: 'Cinzel', serif; font-size: 64px; font-weight: 700; color: var(--wine); text-align: center; letter-spacing: 0.08em; margin: 18px 0 22px; line-height: 1; text-shadow: 0 2px 0 rgba(212, 161, 74, 0.3); }
  .q-number { font-family: 'Cinzel', serif; font-size: 56px; font-weight: 700; color: var(--imperial); text-align: center; margin: 18px 0 22px; line-height: 1; }
  .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 460px; margin: 0 auto; }
  .option-btn { background: var(--parchment-light); border: 2px solid var(--stone-dark); border-radius: 4px; padding: 14px; font-family: 'Cinzel', serif; font-size: 18px; font-weight: 500; color: var(--wine); cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.04em; }
  .option-btn:hover:not(:disabled) { background: var(--gold); border-color: var(--gold-dark); transform: translateY(-2px); box-shadow: 0 3px 8px rgba(58, 40, 20, 0.2); }
  .option-btn:active:not(:disabled) { transform: translateY(0); }
  .option-btn.correct { background: var(--laurel); color: var(--parchment-light); border-color: var(--laurel-dark); }
  .option-btn.wrong { background: var(--terracotta); color: var(--parchment-light); border-color: var(--terracotta-dark); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct:disabled, .option-btn.wrong:disabled { opacity: 1; }
  .option-btn.dim { opacity: 0.55; }
  .feedback { text-align: center; margin: 16px 0 4px; font-size: 15px; min-height: 26px; font-weight: 500; line-height: 1.5; }
  .feedback.good { color: var(--laurel-dark); }
  .feedback.bad { color: var(--terracotta-dark); }
  .feedback .explainer { display: block; font-style: italic; font-size: 13px; color: var(--ink-light); margin-top: 4px; font-weight: 400; }
  .primary-btn { background: var(--terracotta); color: var(--parchment-light); border: 2px solid var(--wine); border-radius: 4px; padding: 14px 32px; font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; cursor: pointer; display: block; margin: 22px auto 0; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s ease; box-shadow: 0 3px 0 var(--wine); }
  .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 var(--wine); }
  .primary-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--wine); }
  .primary-btn:disabled { background: var(--stone); border-color: var(--stone-dark); color: var(--ink-light); cursor: not-allowed; box-shadow: 0 2px 0 var(--stone-dark); transform: none; }
  .primary-btn.imperial { background: var(--imperial); border-color: var(--imperial-dark); box-shadow: 0 3px 0 var(--imperial-dark); }
  .primary-btn.imperial:hover { box-shadow: 0 5px 0 var(--imperial-dark); }
  .primary-btn.danger { background: var(--terracotta-dark); border-color: var(--wine); box-shadow: 0 3px 0 var(--wine); }
  .restart-btn { background: transparent; color: var(--ink-light); border: 1.5px solid var(--stone-dark); border-radius: 4px; padding: 10px 24px; font-family: 'Cinzel', serif; font-size: 12px; font-weight: 500; cursor: pointer; display: block; margin: 10px auto 0; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s ease; }
  .restart-btn:hover { background: var(--parchment-dark); border-color: var(--ink-light); color: var(--ink); }
  .resume-note { font-style: italic; color: var(--laurel-dark); text-align: center; margin-top: 14px; font-size: 14px; }
  .badge-row { display: flex; gap: 12px; justify-content: center; margin: 18px 0; flex-wrap: wrap; }
  .badge { width: 64px; height: 64px; border-radius: 50%; background: var(--parchment-dark); border: 3px solid var(--stone-dark); display: flex; align-items: center; justify-content: center; transition: all 0.3s; position: relative; }
  .badge.earned { background: var(--gold); border-color: var(--gold-dark); box-shadow: 0 0 16px rgba(212, 161, 74, 0.5); }
  .badge.locked { opacity: 0.4; }
  .badge .roman { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--wine); }
  .reward-name { font-family: 'Cinzel', serif; font-size: 18px; color: var(--wine); text-align: center; margin: 8px 0; font-weight: 500; letter-spacing: 0.05em; }
  .victory-banner { text-align: center; margin: 16px 0 24px; }
  .victory-banner h1 { font-family: 'Cinzel', serif; font-size: 36px; color: var(--wine); font-weight: 700; letter-spacing: 0.06em; margin-bottom: 6px; }
  .victory-final-score { font-family: 'Cinzel', serif; font-size: 22px; color: var(--imperial); font-weight: 500; margin: 14px 0; }
  .qtype-chip { display: inline-block; background: var(--parchment-dark); border: 1px solid var(--stone); border-radius: 3px; padding: 3px 10px; font-family: 'Cinzel', serif; font-size: 11px; color: var(--wine); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .center { text-align: center; }
  .max-w { max-width: 540px; margin-left: auto; margin-right: auto; }

  /* === PLAYER PICKER === */
  .picker-title { font-family: 'Cinzel', serif; font-size: 22px; color: var(--wine); text-align: center; letter-spacing: 0.06em; margin: 6px 0 4px; }
  .picker-subtitle { font-style: italic; color: var(--ink-light); text-align: center; margin-bottom: 22px; font-size: 14px; }
  .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .player-card {
    position: relative;
    border: 2px solid var(--stone-dark);
    border-radius: 5px;
    padding: 16px 14px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--parchment-light);
    text-align: center;
  }
  .player-card.feminine { background: var(--rose-bg-light); border-color: var(--wine); }
  .player-card.feminine:hover { background: var(--rose-bg); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(122, 46, 31, 0.18); }
  .player-card.masculine { background: var(--imperial-bg-light); border-color: var(--imperial); }
  .player-card.masculine:hover { background: var(--imperial-bg); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(91, 62, 125, 0.2); }
  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .player-card.feminine .player-name { color: var(--wine); }
  .player-card.masculine .player-name { color: var(--imperial); }
  .player-name .gender-mark { font-size: 18px; margin-right: 4px; vertical-align: -1px; }
  .player-stats { font-size: 12px; color: var(--ink-light); margin-bottom: 10px; }
  .player-stats .badges-mini { display: inline-flex; gap: 3px; margin-right: 8px; vertical-align: -2px; }
  .player-stats .b-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--parchment-dark); border: 1.5px solid var(--stone-dark); display: inline-block; }
  .player-stats .b-dot.earned { background: var(--gold); border-color: var(--gold-dark); }
  .player-stats .last-seen { font-style: italic; }
  .player-card .delete-btn {
    position: absolute;
    top: 6px; right: 6px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid var(--stone-dark);
    color: var(--ink-light);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    padding: 0;
  }
  .player-card .delete-btn:hover { background: var(--terracotta); border-color: var(--wine); color: white; }
  .add-player-card {
    border: 2px dashed var(--stone-dark);
    border-radius: 5px;
    padding: 28px 14px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    text-align: center;
    color: var(--ink-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 130px;
  }
  .add-player-card:hover { border-color: var(--wine); color: var(--wine); background: var(--parchment-dark); }
  .add-player-card .plus { font-size: 32px; line-height: 1; margin-bottom: 6px; font-family: 'Cinzel', serif; font-weight: 400; }
  .add-player-card .add-label { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* === CREATE PLAYER === */
  .create-form { max-width: 580px; margin: 0 auto; }
  .field-label { font-family: 'Cinzel', serif; font-size: 12px; color: var(--wine); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .name-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--stone-dark);
    border-radius: 4px;
    background: var(--parchment);
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.04em;
    margin-bottom: 18px;
  }
  .name-input:focus { outline: none; border-color: var(--wine); box-shadow: 0 0 0 3px rgba(122, 46, 31, 0.18); }
  .or-divider { text-align: center; color: var(--ink-light); font-style: italic; margin: 6px 0 12px; font-size: 13px; }
  .name-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .name-col { padding: 12px; border-radius: 5px; }
  .name-col.feminine { background: var(--rose-bg-light); border: 1.5px solid var(--wine); }
  .name-col.masculine { background: var(--imperial-bg-light); border: 1.5px solid var(--imperial); }
  .name-col-header { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
  .name-col.feminine .name-col-header { color: var(--wine); }
  .name-col.masculine .name-col-header { color: var(--imperial); }
  .name-col-header .gender-mark { font-size: 16px; margin-right: 6px; vertical-align: -1px; }
  .name-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .name-tile {
    padding: 8px 4px;
    border-radius: 3px;
    text-align: center;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid transparent;
    transition: all 0.12s ease;
    letter-spacing: 0.03em;
  }
  .name-col.feminine .name-tile { background: white; color: var(--wine); border-color: rgba(122, 46, 31, 0.3); }
  .name-col.feminine .name-tile:hover { background: var(--rose-bg); border-color: var(--wine); }
  .name-col.feminine .name-tile.selected { background: var(--wine); color: white; border-color: var(--wine); }
  .name-col.masculine .name-tile { background: white; color: var(--imperial); border-color: rgba(91, 62, 125, 0.3); }
  .name-col.masculine .name-tile:hover { background: var(--imperial-bg); border-color: var(--imperial); }
  .name-col.masculine .name-tile.selected { background: var(--imperial); color: white; border-color: var(--imperial); }
  .create-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }

  /* === DELETE CAPTCHA MODAL === */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(58, 40, 20, 0.55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-card { background: var(--parchment-light); border: 1px solid var(--stone); border-left: 5px solid var(--terracotta); border-radius: 4px; padding: 28px 24px 20px; max-width: 440px; width: 100%; box-shadow: 0 12px 40px rgba(58, 40, 20, 0.4); }
  .modal-card h3 { font-family: 'Cinzel', serif; font-size: 20px; color: var(--wine); margin-bottom: 8px; letter-spacing: 0.04em; }
  .modal-card .modal-sub { font-size: 14px; color: var(--ink-light); margin-bottom: 16px; line-height: 1.55; }
  .captcha-problem { font-family: 'Cinzel', serif; font-size: 38px; font-weight: 700; color: var(--wine); text-align: center; letter-spacing: 0.08em; margin: 14px 0; padding: 14px; background: var(--parchment-dark); border-radius: 4px; }
  .captcha-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--stone-dark);
    border-radius: 4px;
    background: white;
    font-family: 'Cinzel', serif;
    font-size: 20px;

/* ============== HELPERS: PARSING & UTIL ============== */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function romanToInt(s) {
  s = String(s).toUpperCase().trim();
  if (!/^[IVXLCDM]+$/.test(s)) return NaN;
  const map = { I:1, V:5, X:10, L:50, C:100, D:500, M:1000 };
  let result = 0;
  for (let i = 0; i < s.length; i++) {
    const c = s[i], next = s[i+1];
    if (next && map[next] > map[c]) result -= map[c];
    else result += map[c];
  }
  return result;
}
function parseAnswer(input) {
  const trimmed = String(input).trim();
  if (!trimmed) return NaN;
  if (/^\d+$/.test(trimmed)) return parseInt(trimmed, 10);
  if (/^[IVXLCDM]+$/i.test(trimmed)) return romanToInt(trimmed);
  return NaN;
}
function genId() {
  return "p_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);
}
function totalQuestions() {
  return STAGES.reduce((acc, s) => acc + s.questions.length, 0) + FINAL_CHALLENGE.questions.length;
}

/* ============== STORAGE: PLAYERS ============== */
const PLAYERS_KEY = "marcus-players-v2";
const ACTIVE_KEY = "marcus-active-player-v2";
const OLD_SAVE_KEY = "marcus-roman-numerals-v1";

function loadPlayers() {
  try {
    const raw = localStorage.getItem(PLAYERS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function persistPlayers() {
  try { localStorage.setItem(PLAYERS_KEY, JSON.stringify(state.players)); } catch (e) {}
}
function getActiveId() {
  try { return localStorage.getItem(ACTIVE_KEY); } catch (e) { return null; }
}
function setActiveId(id) {
  try {
    if (id) localStorage.setItem(ACTIVE_KEY, id);
    else localStorage.removeItem(ACTIVE_KEY);
  } catch (e) {}
}
function findPlayer(id) {
  return state.players.find(p => p.id === id);
}
function defaultGameState() {
  return { screen: "welcome", stage: 0, qIndex: 0, score: 0, totalQuestions: totalQuestions(), badges: [false,false,false,false], lastSelected: null, lastCorrect: null, finalQIndex: 0 };
}
function migrateOldSave() {
  // If a v1 save exists and there are no v2 players yet, convert it to a default "Marcus" player.
  try {
    const raw = localStorage.getItem(OLD_SAVE_KEY);
    if (!raw) return;
    const v2Players = loadPlayers();
    if (v2Players.length > 0) return; // already migrated
    const old = JSON.parse(raw);
    if (!old || typeof old !== "object") return;
    const player = {
      id: genId(),
      name: "Marcus",
      gender: "boy",
      gameState: {
        screen: old.screen || "welcome",
        stage: old.stage || 0,
        qIndex: old.qIndex || 0,
        score: old.score || 0,
        totalQuestions: old.totalQuestions || totalQuestions(),
        badges: Array.isArray(old.badges) ? old.badges.slice() : [false,false,false,false],
        lastSelected: typeof old.lastSelected !== "undefined" ? old.lastSelected : null,
        lastCorrect: typeof old.lastCorrect !== "undefined" ? old.lastCorrect : null,
        finalQIndex: old.finalQIndex || 0
      },
      lastPlayed: Date.now()
    };
    localStorage.setItem(PLAYERS_KEY, JSON.stringify([player]));
    localStorage.removeItem(OLD_SAVE_KEY);
  } catch (e) {}
}
function persistActivePlayerGameState() {
  if (!state.activePlayerId) return;
  const p = findPlayer(state.activePlayerId);
  if (!p) return;
  // Pull the in-memory game state into the player record.
  p.gameState = {
    screen: state.screen, stage: state.stage, qIndex: state.qIndex, score: state.score,
    totalQuestions: state.totalQuestions, badges: state.badges.slice(),
    lastSelected: state.lastSelected, lastCorrect: state.lastCorrect, finalQIndex: state.finalQIndex
  };
  p.lastPlayed = Date.now();
  persistPlayers();
}
function loadActivePlayerGameState() {
  if (!state.activePlayerId) return;
  const p = findPlayer(state.activePlayerId);
  if (!p) return;
  const g = p.gameState || defaultGameState();
  state.screen = g.screen || "welcome";
  state.stage = g.stage || 0;
  state.qIndex = g.qIndex || 0;
  state.score = g.score || 0;
  state.totalQuestions = g.totalQuestions || totalQuestions();
  state.badges = Array.isArray(g.badges) ? g.badges.slice() : [false,false,false,false];
  state.lastSelected = typeof g.lastSelected !== "undefined" ? g.lastSelected : null;
  state.lastCorrect = typeof g.lastCorrect !== "undefined" ? g.lastCorrect : null;
  state.finalQIndex = g.finalQIndex || 0;
}

    return `<button class="${cls}" data-action="answer-final" data-value="${opt}" ${answered ? "disabled" : ""}>${opt}</button>`;
  }).join("")}</div>${feedback}${helpPanel()}${answered ? `<button class="primary-btn" data-action="next-final">${isLast ? "See Your Victory" : "Decode Next Line →"}</button>` : ""}</div>`;
}
function renderVictory() {
  const p = findPlayer(state.activePlayerId);
  const name = p ? escapeHtml(p.name) : "Messenger";
  return `${playerStrip()}<div class="center"><div class="scene-illus">${svgIllus("trophy")}</div><div class="victory-banner"><h1>VICTORY, ${name.toUpperCase()}!</h1><div class="scene-subtitle">Messenger of Rome</div></div><p class="scene-text max-w">You read every line of the lost scroll and delivered the message to the Emperor himself. The Senate and People of Rome honor your skill. You now understand Roman numerals — the same symbols still used today on clocks, chapter headings, the Olympic Games, movie credits, and the Super Bowl!</p><div class="victory-final-score">Final score: ${state.score} / ${state.totalQuestions}</div><div class="badge-row">${state.badges.map((earned, i) => `<div class="badge earned" title="${STAGES[i].rewardName}"><span class="roman">${["I","II","III","IV"][i]}</span></div>`).join("")}</div><p class="scene-text max-w" style="font-style:italic;color:var(--ink-light);text-align:center;">— Ave Roma, Ave ${name} —</p><button class="primary-btn" data-action="restart-player">Play Again</button><button class="restart-btn" data-action="back-to-picker">Back to player picker</button></div>`;
}

function renderModal() {
  if (!state.modal) { modalRoot.innerHTML = ""; return; }
  if (state.modal.kind === "delete-captcha") {
    const m = state.modal;
    const p = findPlayer(m.playerId);
    if (!p) { state.modal = null; modalRoot.innerHTML = ""; return; }
    modalRoot.innerHTML = `
      <div class="modal-backdrop" data-action="modal-backdrop">
        <div class="modal-card" role="dialog" aria-labelledby="dlg-title">
          <h3 id="dlg-title">Delete ${escapeHtml(p.name)}'s save?</h3>
          <p class="modal-sub">This will erase ${escapeHtml(p.name)}'s progress permanently. To confirm, solve this Roman numeral problem:</p>
          <div class="captcha-problem">${m.captcha.q}</div>
          <input type="text"
            class="captcha-input"
            id="captcha-input"
            value="${escapeHtml(m.value || "")}"
            placeholder="Roman or number"
            data-action="captcha-typing"
            autocomplete="off"
            autocapitalize="characters" />
          <div class="captcha-hint">Answer as a Roman numeral (e.g. XLIX) or a number (e.g. 49).</div>
          <div class="captcha-error">${m.error || ""}</div>
          <div class="modal-actions">
            <button class="modal-cancel" data-action="cancel-delete">Cancel</button>
            <button class="modal-confirm" data-action="confirm-delete" ${m.value ? "" : "disabled"}>Delete</button>
          </div>
        </div>
      </div>`;
    // Focus the input
    setTimeout(() => {
      const inp = document.getElementById("captcha-input");
      if (inp) inp.focus();
    }, 0);
  }
}

function render() {
  let html = "";
  switch (state.screen) {
    case "picker":   html = renderPicker(); break;
    case "create":   html = renderCreate(); break;
    case "welcome":  html = renderWelcome(); break;
    case "story":    html = renderStory(); break;
    case "lesson":   html = renderLesson(); break;
    case "practice": html = renderPractice(); break;
    case "reward":   html = renderReward(); break;
    case "final":    html = renderFinal(); break;
    case "victory":  html = renderVictory(); break;
  }
  content.innerHTML = html;
  // Persist active player's game state on render — but only for actual game screens.
  // Skip "welcome" because that's a launching UI, not real progress; otherwise selecting
  // a player and showing them welcome would overwrite their saved screen as "welcome".
  // Also skip "picker" and "create" (no active player game state to persist there).
  if (state.activePlayerId
      && state.screen !== "picker"
      && state.screen !== "create"
      && state.screen !== "welcome") {
    persistActivePlayerGameState();
  }
  renderModal();
  // Re-attach focus / value preservation for inputs
  if (state.screen === "create") {
    const inp = document.getElementById("custom-name-input");
    if (inp && document.activeElement !== inp) {
      // place caret at end
      const v = inp.value;
      inp.focus();
      inp.setSelectionRange(v.length, v.length);
    }
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ============== EVENTS ============== */
// Click delegation on the card and modal root.
function handleClick(e) {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;
  switch (action) {
    case "toggle-help":     state.showHelp = !state.showHelp; render(); return;
    case "open-create":
      state.screen = "create";
      state.newName = "";
      state.newGender = null;
      render(); return;
    case "cancel-create":
      state.screen = "picker";
      state.newName = "";
      state.newGender = null;
      render(); return;
    case "pick-name":
      state.newName = t.dataset.name || "";
      state.newGender = t.dataset.gender || null;
      render(); return;
    case "confirm-create": {
      const name = (state.newName || "").trim().slice(0, 20);
      if (!name) return;
      const player = {
        id: genId(),
        name: name,
        gender: state.newGender, // may be null for custom-typed names
        gameState: defaultGameState(),
        lastPlayed: Date.now()
      };
      state.players.push(player);
      persistPlayers();
      state.activePlayerId = player.id;
      setActiveId(player.id);
      loadActivePlayerGameState();
      state.screen = "welcome";
      state.newName = "";
      state.newGender = null;
      render(); return;
    }
    case "select-player":
      state.activePlayerId = t.dataset.player;
      setActiveId(t.dataset.player);
      loadActivePlayerGameState();
      state.screen = "welcome";
      render(); return;
    case "back-to-picker":
      state.activePlayerId = null;
      setActiveId(null);
      state.screen = "picker";
      render(); return;
    case "request-delete": {
      e.preventDefault(); e.stopPropagation();
      const playerId = t.dataset.player;
      const cap = CAPTCHA_PROBLEMS[Math.floor(Math.random() * CAPTCHA_PROBLEMS.length)];
      state.modal = { kind: "delete-captcha", playerId, captcha: cap, value: "", error: "" };
      render(); return;
    }
    case "cancel-delete":
    case "modal-backdrop":
      // Only close when clicking the backdrop itself, not its children.
      if (action === "modal-backdrop" && e.target !== t) return;
      state.modal = null;
      render(); return;
    case "confirm-delete": {
      if (!state.modal) return;
      const m = state.modal;
      const parsed = parseAnswer(m.value);
      if (parsed === m.captcha.n) {
        // Correct — delete the player.
        const id = m.playerId;
        state.players = state.players.filter(p => p.id !== id);
        persistPlayers();
        if (state.activePlayerId === id) {
          state.activePlayerId = null;
          setActiveId(null);
        }
        state.modal = null;
        state.screen = "picker";
        render();
      } else {
        m.error = "That's not the right answer. Try again.";
        m.value = "";
        render();
      }
      return;
    }
    case "begin":
      // Start the active player's adventure fresh
      if (!state.activePlayerId) return;
      state.stage = 0; state.qIndex = 0; state.score = 0;
      state.totalQuestions = totalQuestions();
      state.badges = [false,false,false,false];
      state.lastSelected = null; state.lastCorrect = null; state.finalQIndex = 0;
      state.screen = "story";
      render(); return;
    case "continue":
      // gameState already loaded for active player; just go to whatever screen they were on.
      const p = findPlayer(state.activePlayerId);
      if (p && p.gameState && p.gameState.screen) {
        loadActivePlayerGameState();
        // Already loaded by select-player flow; but in case continue clicked from welcome:
        state.screen = p.gameState.screen;
      }
      render(); return;
    case "restart-player":
      // Clear the active player's progress and go to welcome.
      // Force-persist the cleared state since the welcome screen otherwise skips persistence.
      if (state.activePlayerId) {
        state.stage = 0; state.qIndex = 0; state.score = 0;
        state.totalQuestions = totalQuestions();
        state.badges = [false,false,false,false];
        state.lastSelected = null; state.lastCorrect = null; state.finalQIndex = 0;
        state.screen = "welcome";
        persistActivePlayerGameState();
      }
      render(); return;
    case "to-lesson":   state.screen = "lesson"; render(); return;
    case "to-practice":
      state.screen = "practice"; state.qIndex = 0; state.lastCorrect = null; state.lastSelected = null;
      render(); return;
    case "answer": {
      const raw = t.dataset.value;
      const q = STAGES[state.stage].questions[state.qIndex];
      const val = (typeof q.answer === "number") ? parseInt(raw, 10) : raw;
      state.lastSelected = val;
      state.lastCorrect = (val === q.answer);
      if (state.lastCorrect) state.score++;
      render(); return;
    }
    case "next-question": {
      const s = STAGES[state.stage];
      if (state.qIndex < s.questions.length - 1) {
        state.qIndex++; state.lastCorrect = null; state.lastSelected = null; render();
      } else {
        state.badges[state.stage] = true; state.screen = "reward"; render();
      }
      return;
    }
    case "next-stage":
      state.stage++; state.screen = "story"; state.qIndex = 0; state.lastCorrect = null; state.lastSelected = null;
      render(); return;
    case "to-final":
      state.screen = "final"; state.finalQIndex = 0; state.lastCorrect = null; state.lastSelected = null;
      render(); return;
    case "answer-final": {
      const raw = t.dataset.value;
      const q = FINAL_CHALLENGE.questions[state.finalQIndex];
      const val = (typeof q.answer === "number") ? parseInt(raw, 10) : raw;
      state.lastSelected = val;
      state.lastCorrect = (val === q.answer);
      if (state.lastCorrect) state.score++;
      render(); return;
    }
    case "next-final":
      if (state.finalQIndex < FINAL_CHALLENGE.questions.length - 1) {
        state.finalQIndex++; state.lastCorrect = null; state.lastSelected = null; render();
      } else {
        state.screen = "victory"; render();
      }
      return;
  }
}
function handleInput(e) {
  const t = e.target;
  const action = t.dataset.action;
  if (action === "custom-name-typing") {
    state.newName = (t.value || "").slice(0, 20);
    state.newGender = null; // custom typed name has no gender association
    // Don't full re-render on every keystroke; just update the Begin button enabled state
    const begin = card.querySelector('[data-action="confirm-create"]');
    if (begin) {
      if (state.newName) begin.removeAttribute("disabled"); else begin.setAttribute("disabled", "");
    }
    // Clear any selected name tile
    card.querySelectorAll(".name-tile.selected").forEach(el => el.classList.remove("selected"));
    return;
  }
  if (action === "captcha-typing" && state.modal) {
    state.modal.value = t.value || "";
    state.modal.error = "";
    const confirmBtn = modalRoot.querySelector('[data-action="confirm-delete"]');
    if (confirmBtn) {
      if (state.modal.value) confirmBtn.removeAttribute("disabled"); else confirmBtn.setAttribute("disabled", "");
    }
  }
}
function handleKeydown(e) {
  // Enter inside captcha submits
  if (e.key === "Enter" && state.modal && e.target.id === "captcha-input") {
    e.preventDefault();
    const btn = modalRoot.querySelector('[data-action="confirm-delete"]');
    if (btn && !btn.disabled) btn.click();
  }
  // Escape closes modal
  if (e.key === "Escape" && state.modal) {
    state.modal = null;
    render();
  }
  // Enter on custom name input → submit if valid
  if (e.key === "Enter" && state.screen === "create" && e.target.id === "custom-name-input") {
    e.preventDefault();
    const btn = card.querySelector('[data-action="confirm-create"]');
    if (btn && !btn.disabled) btn.click();
  }
}

card.addEventListener("click", handleClick);
modalRoot.addEventListener("click", handleClick);
card.addEventListener("input", handleInput);
modalRoot.addEventListener("input", handleInput);
document.addEventListener("keydown", handleKeydown);

/* ============== INIT ============== */
(function init() {
  migrateOldSave();
  state.players = loadPlayers();
  // Ensure totalQuestions is always set in default state
  state.totalQuestions = totalQuestions();
  // Don't auto-resume into a player — always start on the picker so multi-user households are explicit.
  // But if the previously active player is still in the players list, leave activePlayerId nulled here too.
  state.activePlayerId = null;
  setActiveId(null);
  if (state.players.length === 0) {
    state.screen = "create";
  } else {
    state.screen = "picker";
  }
  render();
})();
</script>
</body>
</html>
